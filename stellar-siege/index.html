<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Siege</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:600px;font-family:monospace}
canvas{display:block;border:1px solid #1a1a2e;border-radius:4px}
#ui{display:flex;gap:16px;padding:8px 0;width:560px;align-items:center;justify-content:space-between}
.stat{font-size:12px;color:#8888aa;letter-spacing:1px}
.stat span{color:#e0e0ff;font-size:14px;font-weight:bold;transition:color 0.15s}
#hint{font-size:11px;color:#555;text-align:center;padding-top:4px}
</style>
</head>
<body>
<div id="ui">
  <div class="stat">SCORE <span id="scoreEl">0</span></div>
  <div class="stat">WAVE <span id="waveEl">1</span></div>
  <div class="stat">LIVES <span id="livesEl">♦♦♦</span></div>
  <div class="stat">SHIELD <span id="shieldEl">████████</span></div>
</div>
<canvas id="c" width="560" height="520"></canvas>
<div id="hint">WASD / Arrows to move · Mouse to aim & fire · Click to start</div>

<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=560,H=520;
let state='title',score=0,wave=1,lives=3,shield=100,frame=0;
let shake=0,shakeX=0,shakeY=0;
let hitStop=0; // freeze-frame counter for juice
let damageFlash=0; // red vignette pulse on player hit
let waveCard={active:false,t:0,text:''};
let combo=0,comboTimer=0,comboBest=0;
let floatTexts=[]; // floating score popups

// Player
const player={x:W/2,y:H-80,r:14,vx:0,vy:0,mx:W/2,my:H/2,invincible:0,thrustParticles:[],tilt:0};
const SPEED=3.2;

// Collections
let bullets=[],enemies=[],particles=[],explosions=[],stars=[],pickups=[],debris=[],rings=[];
let keys={};

// ── AUDIO ENGINE ─────────────────────────────────────────
let audioCtx=null,ambientNode=null;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();

  const bufSize=audioCtx.sampleRate*2;
  const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1);
  const noise=audioCtx.createBufferSource();
  noise.buffer=buf;noise.loop=true;

  const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=80;lp.Q.value=0.5;
  const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=30;
  const ambGain=audioCtx.createGain();ambGain.gain.value=0.018;

  noise.connect(lp);lp.connect(hp);hp.connect(ambGain);ambGain.connect(audioCtx.destination);
  noise.start();
  ambientNode=ambGain;
}
function playShoot(){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(600,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(180,audioCtx.currentTime+0.09);
  g.gain.setValueAtTime(0.06,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.09);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.1);
}
function playHit(){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.05,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.015));
  const src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  g.gain.value=0.1;src.buffer=buf;src.connect(g);g.connect(audioCtx.destination);src.start();
}
function playExplosion(big){
  if(!audioCtx)return;
  const dur=big?0.6:0.3;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  const dec=audioCtx.sampleRate*(big?0.15:0.07);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/dec);
  const src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=big?600:400;
  g.gain.value=big?0.35:0.18;
  src.buffer=buf;src.connect(lp);lp.connect(g);g.connect(audioCtx.destination);src.start();
}
function playShieldDown(){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(440,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80,audioCtx.currentTime+0.4);
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.41);
}
function playWaveClear(){
  if(!audioCtx)return;
  [330,440,550,660].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    const t=audioCtx.currentTime+i*0.12;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.1,t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.31);
  });
}
function playCombo(level){
  if(!audioCtx)return;
  // Rising tone, pitch climbs with combo level — gives streaks an audible payoff
  const base=520+Math.min(level,12)*40;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(base,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(base*1.5,audioCtx.currentTime+0.08);
  g.gain.setValueAtTime(0.07,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.13);
}

// Stars
for(let i=0;i<180;i++){
  stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,s:Math.random()*0.3+0.1,b:Math.random()})
}

// Nebula clouds
const nebulae=[];
for(let i=0;i<8;i++){
  nebulae.push({x:Math.random()*W,y:Math.random()*H,r:60+Math.random()*90,
    hue:Math.random()<0.5?210:290,alpha:0.04+Math.random()*0.05,spd:0.05+Math.random()*0.1});
}

// Floating asteroid debris
for(let i=0;i<22;i++){
  const pts=[];const sides=5+Math.floor(Math.random()*4);const br=6+Math.random()*14;
  for(let j=0;j<sides;j++){const a=j/sides*Math.PI*2;const r=br*(0.7+Math.random()*0.35);pts.push([Math.cos(a)*r,Math.sin(a)*r]);}
  debris.push({x:Math.random()*W,y:Math.random()*H,pts,rot:Math.random()*Math.PI*2,
    rotSpd:(Math.random()-0.5)*0.012,spd:0.18+Math.random()*0.28,alpha:0.18+Math.random()*0.25});
}

// Input
window.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)&&e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.key]=false});
c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();player.mx=e.clientX-r.left;player.my=e.clientY-r.top});
let mouseDown=false;
c.addEventListener('mousedown',e=>{mouseDown=true;if(state!=='playing'){startGame()}});
c.addEventListener('mouseup',()=>mouseDown=false);
c.addEventListener('touchstart',e=>{const r=c.getBoundingClientRect(),t=e.touches[0];player.mx=t.clientX-r.left;player.my=t.clientY-r.top;mouseDown=true;if(state!=='playing')startGame();e.preventDefault()},{passive:false});
c.addEventListener('touchmove',e=>{const r=c.getBoundingClientRect(),t=e.touches[0];player.mx=t.clientX-r.left;player.my=t.clientY-r.top;e.preventDefault()},{passive:false});
c.addEventListener('touchend',()=>mouseDown=false);

function startGame(){
  initAudio();
  state='playing';score=0;wave=1;lives=3;shield=100;frame=0;
  player.x=W/2;player.y=H-80;player.vx=0;player.vy=0;player.invincible=0;player.tilt=0;
  bullets=[];enemies=[];particles=[];explosions=[];pickups=[];rings=[];floatTexts=[];
  combo=0;comboTimer=0;comboBest=0;damageFlash=0;hitStop=0;
  spawnWave(1);
  triggerWaveCard('WAVE 1');
}

function triggerWaveCard(text){
  waveCard.active=true;waveCard.t=0;waveCard.text=text;
}

// Enemy types
function spawnWave(w){
  enemies=[];
  const types=['drone','tank','speeder','sniper'];
  const count=5+w*2;
  for(let i=0;i<count;i++){
    const t=types[Math.min(Math.floor(Math.random()*(1+w*0.5)),types.length-1)];
    spawnEnemy(t,i,count,w);
  }
  if(w%3===0) spawnBoss(w);
}

function spawnEnemy(type,i,total,w){
  const cols=Math.ceil(total/2);
  const col=i%cols,row=Math.floor(i/cols);
  const x=60+col*(W-120)/(cols-1||1)+Math.random()*20-10;
  const y=50+row*55+Math.random()*10;
  const configs={
    drone:{hp:1,r:10,color:'#4fc3f7',glowColor:'#0288d1',pts:100,spd:0.7+w*0.1,fireRate:Math.max(60,150-w*8),bullet:'basic'},
    tank:{hp:4+Math.floor(w/2),r:16,color:'#ef5350',glowColor:'#b71c1c',pts:300,spd:0.4+w*0.04,fireRate:Math.max(80,200-w*10),bullet:'spread'},
    speeder:{hp:1,r:8,color:'#66bb6a',glowColor:'#1b5e20',pts:150,spd:1.6+w*0.18,fireRate:Math.max(90,260-w*10),bullet:'basic'},
    sniper:{hp:2,r:11,color:'#ffa726',glowColor:'#e65100',pts:200,spd:0.3+w*0.03,fireRate:Math.max(50,100-w*4),bullet:'fast'},
  };
  const cfg=configs[type];
  enemies.push({...cfg,x,y,vx:(Math.random()-0.5)*0.5,vy:0.2,type,fireTimer:Math.random()*cfg.fireRate,t:0,startX:x,startY:y,phase:Math.random()*Math.PI*2,w,flash:0});
}

function spawnBoss(w){
  enemies.push({hp:20+w*5,maxHp:20+w*5,r:30,color:'#ce93d8',glowColor:'#6a1b9a',pts:2000,spd:0.4,fireRate:60,bullet:'circle',x:W/2,y:80,vx:1,vy:0,type:'boss',fireTimer:0,t:0,phase:0,w,flash:0});
}

let autoShootTimer=0;

function shoot(){
  const dx=player.mx-player.x, dy=player.my-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=dx/dist, ny=dy/dist;
  bullets.push({x:player.x,y:player.y,vx:nx*10,vy:ny*10,r:4,own:true,color:'#00e5ff',life:60});
  spawnThrust(player.x,player.y,3);
  // Muzzle flash spark burst at nose
  for(let i=0;i<4;i++){
    const a=Math.atan2(ny,nx)+(Math.random()-0.5)*0.5;
    particles.push({x:player.x+nx*16,y:player.y+ny*16,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:0.6,maxLife:0.6,r:Math.random()*2+1,color:'#aef9ff',type:'spark'});
  }
}

function spawnThrust(x,y,count){
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*2,vy:Math.random()*2+1,life:1,maxLife:1,r:Math.random()*3+1,color:'#00bcd4',type:'thrust'});
  }
}

function spawnFloatText(x,y,text,color){
  floatTexts.push({x,y,text,color,life:1,vy:-1.1});
}

function enemyShoot(e){
  const spd=4.5+wave*0.25;
  if(e.bullet==='basic'){
    const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    const lead=0.18;
    const tx=player.x+player.vx*lead*d, ty=player.y+player.vy*lead*d;
    const ddx=tx-e.x,ddy=ty-e.y,dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
    bullets.push({x:e.x,y:e.y,vx:ddx/dd*spd,vy:ddy/dd*spd,r:4,own:false,color:'#ff5252',life:100});
  } else if(e.bullet==='spread'){
    for(let a=-1;a<=1;a++){
      const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const ang=Math.atan2(dy,dx)+a*0.28;
      bullets.push({x:e.x,y:e.y,vx:Math.cos(ang)*(spd-0.5),vy:Math.sin(ang)*(spd-0.5),r:5,own:false,color:'#ff7043',life:100});
    }
  } else if(e.bullet==='fast'){
    const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    bullets.push({x:e.x,y:e.y,vx:dx/d*(spd+3),vy:dy/d*(spd+3),r:3,own:false,color:'#ffee58',life:80});
  } else if(e.bullet==='circle'){
    const count=8+Math.min(wave,6);
    for(let a=0;a<count;a++){
      const ang=a/count*Math.PI*2+e.phase;
      bullets.push({x:e.x,y:e.y,vx:Math.cos(ang)*3.5,vy:Math.sin(ang)*3.5,r:5,own:false,color:'#ea80fc',life:140});
    }
  }
}

function bigExplosion(x,y,color,count){
  shake=Math.max(shake,12);
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2,spd=Math.random()*5+1;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,maxLife:1,r:Math.random()*5+2,color,type:'spark'});
  }
  explosions.push({x,y,r:0,maxR:color==='#ce93d8'?120:60,life:1,color});
  // Secondary bright ring for extra punch on top of the old shockwave
  rings.push({x,y,r:4,maxR:color==='#ce93d8'?90:42,life:1,color:'#ffffff'});
}

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawShip(x,y,angle,tilt){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);
  ctx.rotate(tilt*0.25); // subtle bank into strafe direction

  const halo=ctx.createRadialGradient(0,0,0,0,0,36);
  halo.addColorStop(0,'rgba(0,229,255,0.18)');
  halo.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=halo;ctx.beginPath();ctx.arc(0,0,36,0,Math.PI*2);ctx.fill();

  const exhaust1=ctx.createRadialGradient(0,16,0,0,22,10);
  exhaust1.addColorStop(0,'rgba(0,255,220,0.9)');
  exhaust1.addColorStop(0.4,'rgba(0,150,255,0.5)');
  exhaust1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=exhaust1;
  ctx.beginPath();ctx.ellipse(0,20,5,12,0,0,Math.PI*2);ctx.fill();

  const exL=ctx.createRadialGradient(-10,14,0,-10,18,6);
  exL.addColorStop(0,'rgba(0,220,255,0.7)');exL.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=exL;ctx.beginPath();ctx.ellipse(-10,16,3,7,0,0,Math.PI*2);ctx.fill();

  const exR=ctx.createRadialGradient(10,14,0,10,18,6);
  exR.addColorStop(0,'rgba(0,220,255,0.7)');exR.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=exR;ctx.beginPath();ctx.ellipse(10,16,3,7,0,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='#0a1628';
  ctx.strokeStyle='#00e5ff';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,-22);
  ctx.lineTo(3,-10);
  ctx.lineTo(4,4);
  ctx.lineTo(3,14);
  ctx.lineTo(0,12);
  ctx.lineTo(-3,14);
  ctx.lineTo(-4,4);
  ctx.lineTo(-3,-10);
  ctx.closePath();
  ctx.fill();ctx.stroke();

  ctx.fillStyle='#0d2035';
  ctx.strokeStyle='#00c8e6';ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(-3,2);
  ctx.lineTo(-22,14);
  ctx.lineTo(-18,18);
  ctx.lineTo(-10,16);
  ctx.lineTo(-4,10);
  ctx.closePath();
  ctx.fill();ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(3,2);
  ctx.lineTo(22,14);
  ctx.lineTo(18,18);
  ctx.lineTo(10,16);
  ctx.lineTo(4,10);
  ctx.closePath();
  ctx.fill();ctx.stroke();

  ctx.strokeStyle='rgba(0,229,255,0.4)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(-5,4);ctx.lineTo(-18,15);ctx.stroke();
  ctx.beginPath();ctx.moveTo(5,4);ctx.lineTo(18,15);ctx.stroke();

  ctx.fillStyle='#081520';ctx.strokeStyle='#00e5ff';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(-11,10,3,5,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(11,10,3,5,0,0,Math.PI*2);ctx.fill();ctx.stroke();

  ctx.fillStyle='#0d2a3a';ctx.strokeStyle='#00e5ff';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-3,-8);ctx.lineTo(-11,-4);ctx.lineTo(-9,0);ctx.lineTo(-3,-2);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(3,-8);ctx.lineTo(11,-4);ctx.lineTo(9,0);ctx.lineTo(3,-2);ctx.closePath();ctx.fill();ctx.stroke();

  ctx.fillStyle='rgba(0,200,255,0.15)';
  ctx.strokeStyle='#80eeff';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(0,-6,3,7,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();ctx.ellipse(-0.8,-8,1,3,0.3,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='#00e5ff';
  ctx.beginPath();ctx.rect(-1,-26,2,6);ctx.fill();
  ctx.fillStyle='rgba(0,229,255,0.6)';
  ctx.beginPath();ctx.ellipse(0,-26,2,2,0,0,Math.PI*2);ctx.fill();

  ctx.strokeStyle='rgba(0,229,255,0.5)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(0,12);ctx.stroke();

  ctx.restore();
}

function drawEnemyDrone(e,pulse){
  ctx.fillStyle='#0a0a1a';ctx.strokeStyle=e.color;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(0,0,e.r,e.r*0.55,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(80,80,150,0.4)';ctx.strokeStyle=e.color;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.ellipse(0,0,e.r*0.5,e.r*0.28,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#0a0a1a';ctx.strokeStyle=e.color;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-e.r*0.3,0);ctx.lineTo(-e.r*1.1,e.r*0.5);ctx.lineTo(-e.r*0.6,e.r*0.4);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(e.r*0.3,0);ctx.lineTo(e.r*1.1,e.r*0.5);ctx.lineTo(e.r*0.6,e.r*0.4);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.strokeStyle=e.color;ctx.lineWidth=1;ctx.globalAlpha=pulse;
  ctx.beginPath();ctx.ellipse(0,0,e.r*0.7,e.r*0.4,0,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  ctx.fillStyle=e.color;ctx.globalAlpha=pulse;
  ctx.beginPath();ctx.ellipse(0,0,e.r*0.18,e.r*0.1,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
}

function drawEnemyTank(e,pulse){
  const r=e.r;
  ctx.fillStyle='#0f0a0a';ctx.strokeStyle=e.color;ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(0,-r*0.9);ctx.lineTo(r*0.8,-r*0.5);ctx.lineTo(r*0.9,r*0.4);
  ctx.lineTo(r*0.4,r);ctx.lineTo(-r*0.4,r);ctx.lineTo(-r*0.9,r*0.4);
  ctx.lineTo(-r*0.8,-r*0.5);ctx.closePath();
  ctx.fill();ctx.stroke();
  ctx.fillStyle='#1a0808';ctx.strokeStyle=e.color;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-r*0.9,r*0.4);ctx.lineTo(-r*1.3,r*0.1);ctx.lineTo(-r*1.2,r*0.7);ctx.lineTo(-r*0.9,r*0.8);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(r*0.9,r*0.4);ctx.lineTo(r*1.3,r*0.1);ctx.lineTo(r*1.2,r*0.7);ctx.lineTo(r*0.9,r*0.8);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle=e.color;ctx.strokeStyle=e.color;ctx.lineWidth=1;
  ctx.beginPath();ctx.rect(-r*0.3,-r*1.45,r*0.22,r*0.7);ctx.fill();
  ctx.beginPath();ctx.rect(r*0.08,-r*1.45,r*0.22,r*0.7);ctx.fill();
  ctx.fillStyle=e.glowColor;ctx.globalAlpha=pulse;
  ctx.beginPath();ctx.ellipse(-r*0.19,-r*1.48,r*0.1,r*0.07,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(r*0.19,-r*1.48,r*0.1,r*0.07,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,80,80,0.12)';ctx.strokeStyle=e.color;ctx.lineWidth=0.8;ctx.globalAlpha=0.6*pulse;
  ctx.beginPath();ctx.ellipse(0,0,r*0.6,r*0.4,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.globalAlpha=1;
}

function drawEnemySpeeder(e,pulse){
  const r=e.r;
  ctx.fillStyle='#030d0a';ctx.strokeStyle=e.color;ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,-r*2);
  ctx.lineTo(r*0.35,-r*0.5);
  ctx.lineTo(r*0.3,r*0.5);
  ctx.lineTo(0,r);
  ctx.lineTo(-r*0.3,r*0.5);
  ctx.lineTo(-r*0.35,-r*0.5);
  ctx.closePath();
  ctx.fill();ctx.stroke();
  ctx.fillStyle='#061510';ctx.strokeStyle=e.color;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-r*0.3,r*0.2);ctx.lineTo(-r*1.5,r*0.9);ctx.lineTo(-r*0.8,r*1.0);ctx.lineTo(-r*0.3,r*0.6);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(r*0.3,r*0.2);ctx.lineTo(r*1.5,r*0.9);ctx.lineTo(r*0.8,r*1.0);ctx.lineTo(r*0.3,r*0.6);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.strokeStyle=e.color;ctx.lineWidth=0.8;ctx.globalAlpha=0.5;
  ctx.beginPath();ctx.moveTo(0,-r*1.8);ctx.lineTo(0,r*0.8);ctx.stroke();ctx.globalAlpha=1;
  ctx.fillStyle=e.color;ctx.globalAlpha=pulse*0.7;
  ctx.beginPath();ctx.ellipse(0,r*1.1,r*0.12,r*0.18,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
}

function drawEnemySniper(e,pulse){
  const r=e.r;
  ctx.fillStyle='#0a0a08';ctx.strokeStyle=e.color;ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,-r*0.8);ctx.lineTo(r*0.6,-r*0.3);ctx.lineTo(r*0.7,r*0.5);
  ctx.lineTo(0,r*0.9);ctx.lineTo(-r*0.7,r*0.5);ctx.lineTo(-r*0.6,-r*0.3);
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#10100a';ctx.strokeStyle=e.color;ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(-r*1.1,0,r*0.55,r*0.18,0.1,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(r*1.1,0,r*0.55,r*0.18,-0.1,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.strokeStyle=e.color;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.ellipse(-r*1.1,0,r*0.4,r*0.12,0.1,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(r*1.1,0,r*0.4,r*0.12,-0.1,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=e.color;ctx.beginPath();ctx.rect(-r*0.08,-r*1.7,r*0.16,r*0.95);ctx.fill();
  ctx.fillStyle='#0a0a08';ctx.strokeStyle=e.color;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.ellipse(0,-r*1.2,r*0.22,r*0.12,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle=e.glowColor;ctx.globalAlpha=pulse;
  ctx.beginPath();ctx.ellipse(0,-r*1.72,r*0.1,r*0.06,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
}

function drawEnemyBoss(e,pulse){
  const r=e.r;
  ctx.save();ctx.translate(e.x,e.y);

  ctx.save();ctx.rotate(frame*0.015);
  ctx.strokeStyle=e.color;ctx.lineWidth=1.5;
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.arc(0,0,r*1.5,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    ctx.fillStyle=e.color;
    ctx.beginPath();ctx.ellipse(Math.cos(a)*r*1.5,Math.sin(a)*r*1.5,r*0.12,r*0.2,a,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  ctx.save();ctx.rotate(-frame*0.02);
  ctx.strokeStyle=e.glowColor;ctx.lineWidth=1;ctx.globalAlpha=pulse;
  ctx.beginPath();ctx.arc(0,0,r*1.05,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  for(let i=0;i<3;i++){
    const a=i/3*Math.PI*2;
    ctx.fillStyle=e.glowColor;ctx.globalAlpha=pulse;
    ctx.beginPath();ctx.ellipse(Math.cos(a)*r,Math.sin(a)*r,r*0.15,r*0.28,a,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
  ctx.restore();

  ctx.fillStyle='#1a0020';ctx.strokeStyle=e.color;ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(0,-r*0.9);ctx.lineTo(r*0.6,-r*0.5);ctx.lineTo(r*0.8,0);
  ctx.lineTo(r*0.5,r*0.7);ctx.lineTo(0,r*0.9);ctx.lineTo(-r*0.5,r*0.7);
  ctx.lineTo(-r*0.8,0);ctx.lineTo(-r*0.6,-r*0.5);ctx.closePath();
  ctx.fill();ctx.stroke();

  ctx.fillStyle='#2a0035';ctx.strokeStyle=e.glowColor;ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(0,0,r*0.35,r*0.5,0,0,Math.PI*2);ctx.fill();ctx.stroke();

  ctx.fillStyle=e.glowColor;ctx.globalAlpha=pulse;
  ctx.beginPath();ctx.arc(0,0,r*0.18,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle='#ffffff';ctx.globalAlpha=pulse*0.8;
  ctx.beginPath();ctx.arc(0,0,r*0.08,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

  ctx.fillStyle='#1a0020';ctx.fillRect(-r*1.1,r*1.7,r*2.2,7);
  ctx.fillStyle=e.color;ctx.fillRect(-r*1.1,r*1.7,r*2.2*(e.hp/e.maxHp),7);
  ctx.strokeStyle=e.color;ctx.lineWidth=0.8;ctx.strokeRect(-r*1.1,r*1.7,r*2.2,7);

  ctx.restore();
}

function drawEnemy(e){
  const pulse=0.7+0.3*Math.sin(frame*0.1+e.phase);
  const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r*3.5);
  g.addColorStop(0,hexToRgba(e.glowColor,0.25*pulse));
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.r*3.5,0,Math.PI*2);ctx.fill();

  // Hit flash — bright white silhouette pulse when recently struck, makes hits readable instantly
  const flashAmt=e.flash||0;

  if(e.type==='boss'){
    drawEnemyBoss(e,pulse);
    if(flashAmt>0){
      ctx.save();ctx.globalAlpha=flashAmt*0.6;ctx.globalCompositeOperation='lighter';
      ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(e.x,e.y,e.r*1.1,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    return;
  }

  ctx.save();ctx.translate(e.x,e.y);
  ctx.rotate(Math.PI);

  if(e.type==='drone')drawEnemyDrone(e,pulse);
  else if(e.type==='tank')drawEnemyTank(e,pulse);
  else if(e.type==='speeder')drawEnemySpeeder(e,pulse);
  else if(e.type==='sniper')drawEnemySniper(e,pulse);

  if(flashAmt>0){
    ctx.save();ctx.globalAlpha=flashAmt*0.7;ctx.globalCompositeOperation='lighter';
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(0,0,e.r*1.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function update(){
  frame++;

  // Hit-stop: brief freeze on impactful events, skip the rest of update this tick
  if(hitStop>0){hitStop--;
    if(shake>0){shake*=0.8;shakeX=(Math.random()-0.5)*shake;shakeY=(Math.random()-0.5)*shake;}
    updateHUD();
    return;
  }

  if(shake>0){shake*=0.8;shakeX=(Math.random()-0.5)*shake;shakeY=(Math.random()-0.5)*shake;}
  else{shakeX=0;shakeY=0;}

  stars.forEach(s=>{s.y+=s.s;if(s.y>H)s.y=0;});

  let dx=0,dy=0;
  if(keys['a']||keys['ArrowLeft'])dx=-1;
  if(keys['d']||keys['ArrowRight'])dx=1;
  if(keys['w']||keys['ArrowUp'])dy=-1;
  if(keys['s']||keys['ArrowDown'])dy=1;
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  player.vx+=(dx*SPEED-player.vx)*0.18;
  player.vy+=(dy*SPEED-player.vy)*0.18;
  player.x=Math.max(player.r,Math.min(W-player.r,player.x+player.vx));
  player.y=Math.max(player.r,Math.min(H-player.r,player.y+player.vy));
  // Ship banks into its strafe direction for a sense of weight/momentum
  player.tilt+=(player.vx/SPEED-player.tilt)*0.15;
  if(Math.abs(player.vx)>0.5||Math.abs(player.vy)>0.5){
    if(frame%3===0)spawnThrust(player.x,player.y,1);
  }

  autoShootTimer++;
  if(mouseDown&&autoShootTimer>=8){autoShootTimer=0;shoot();playShoot();}

  if(player.invincible>0)player.invincible--;
  if(damageFlash>0)damageFlash-=0.05;
  if(comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0;}

  enemies.forEach(e=>{
    e.t++;e.phase+=0.02;
    if(e.flash>0)e.flash-=0.12;
    if(e.type==='boss'){
      e.x+=e.vx;
      if(e.x<e.r||e.x>W-e.r)e.vx*=-1;
      e.y=80+Math.sin(e.t*0.01)*30;
    } else {
      e.x=e.startX+Math.sin(e.t*0.02+e.phase)*30;
      e.y+=e.spd;
      if(e.y>H+e.r){e.y=-(e.r);e.startX=Math.random()*(W-e.r*2)+e.r;}
    }
    e.fireTimer++;
    if(e.fireTimer>=e.fireRate){e.fireTimer=0;enemyShoot(e);}
  });

  bullets=bullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0||b.x<0||b.x>W||b.y<0||b.y>H)return false;

    if(b.own){
      for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i];
        const d=Math.hypot(b.x-e.x,b.y-e.y);
        if(d<e.r+b.r){
          e.hp--;
          e.flash=1; // trigger hit-flash
          for(let j=0;j<8;j++){const a=Math.random()*Math.PI*2,s=Math.random()*4+1;particles.push({x:b.x,y:b.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,maxLife:1,r:Math.random()*3+1,color:e.color,type:'spark'});}
          if(e.hp<=0){
            // Combo tracking: chained kills within the window escalate the multiplier
            combo++;comboTimer=90;comboBest=Math.max(comboBest,combo);
            const mult=1+Math.floor(combo/3)*0.5;
            const gained=Math.round(e.pts*wave*mult);
            score+=gained;
            spawnFloatText(e.x,e.y,'+'+gained,combo>=3?'#fff176':'#e0e0ff');
            if(combo>=3&&combo%3===0){
              spawnFloatText(e.x,e.y-18,combo+'x COMBO',(e.type==='boss')?'#ce93d8':'#ff8a65');
              playCombo(combo);
            }
            bigExplosion(e.x,e.y,e.color,e.type==='boss'?80:30);
            playExplosion(e.type==='boss');
            // Hit-stop scales with target size — bosses get a meatier freeze
            hitStop=e.type==='boss'?7:3;
            if(Math.random()<0.22)pickups.push({x:e.x,y:e.y,type:Math.random()<0.5?'shield':'score',t:0});
            enemies.splice(i,1);
          } else { playHit(); }
          return false;
        }
      }
    } else {
      if(player.invincible<=0){
        const d=Math.hypot(b.x-player.x,b.y-player.y);
        if(d<player.r+b.r){
          const dmg=15+wave*1.5;
          shield-=dmg;
          shake=Math.max(shake,8);
          damageFlash=1;
          combo=0;comboTimer=0; // taking a hit breaks the streak
          player.invincible=35;
          if(shield<=0){shield=0;lives--;playShieldDown();player.invincible=100;hitStop=10;if(lives<=0){state='gameover';return false;}shield=55;}
          else{playHit();}
          for(let j=0;j<6;j++){const a=Math.random()*Math.PI*2,s=Math.random()*3;particles.push({x:player.x,y:player.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,maxLife:1,r:2,color:'#00e5ff',type:'spark'});}
          return false;
        }
      }
    }
    return true;
  });

  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=0.04;return p.life>0;
  });

  explosions=explosions.filter(e=>{e.r+=6;e.life-=0.07;return e.life>0;});
  rings=rings.filter(r=>{r.r+=4.5;r.life-=0.1;return r.life>0;});

  floatTexts=floatTexts.filter(f=>{f.y+=f.vy;f.vy*=0.96;f.life-=0.018;return f.life>0;});

  pickups=pickups.filter(p=>{
    p.y+=0.5;p.t++;
    const d=Math.hypot(p.x-player.x,p.y-player.y);
    if(d<20){
      if(p.type==='shield'){shield=Math.min(100,shield+30);spawnFloatText(p.x,p.y,'+SHIELD','#4fc3f7');}
      else {const g=500*wave;score+=g;spawnFloatText(p.x,p.y,'+'+g,'#fff176');}
      bigExplosion(p.x,p.y,'#fff176',12);
      return false;
    }
    return p.y<H+20;
  });

  if(enemies.length===0&&state==='playing'){
    wave++;spawnWave(wave);
    score+=wave*500;
    shield=Math.min(100,shield+15);
    playWaveClear();
    triggerWaveCard('WAVE '+wave);
  }

  if(waveCard.active){waveCard.t++;if(waveCard.t>90)waveCard.active=false;}

  nebulae.forEach(n=>{n.y+=n.spd;if(n.y-n.r>H)n.y=-n.r;});
  debris.forEach(d=>{d.y+=d.spd;d.rot+=d.rotSpd;if(d.y-20>H){d.y=-20;d.x=Math.random()*W;}});

  updateHUD();
}

function updateHUD(){
  document.getElementById('scoreEl').textContent=score.toLocaleString();
  document.getElementById('waveEl').textContent=wave;
  document.getElementById('livesEl').textContent='♦'.repeat(lives)+' '.repeat(Math.max(0,3-lives));
  const bars=Math.round(shield/12.5);
  const shieldEl=document.getElementById('shieldEl');
  shieldEl.textContent='█'.repeat(bars)+'░'.repeat(8-bars);
  shieldEl.style.color=shield>50?'#4fc3f7':shield>25?'#ffa726':'#ef5350';
}

function drawTitle(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#00e5ff';ctx.shadowBlur=40;
  ctx.fillStyle='#00e5ff';ctx.font='bold 52px monospace';ctx.fillText('STELLAR SIEGE',W/2,H/2-60);
  ctx.shadowBlur=0;
  ctx.fillStyle='#8888aa';ctx.font='16px monospace';ctx.fillText('Click or tap to launch',W/2,H/2+10);
  ctx.fillStyle='#555';ctx.font='12px monospace';
  ctx.fillText('WASD/Arrows: move  ·  Mouse: aim & fire',W/2,H/2+50);
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#ef5350';ctx.shadowBlur=40;
  ctx.fillStyle='#ef5350';ctx.font='bold 44px monospace';ctx.fillText('SHIP DESTROYED',W/2,H/2-60);
  ctx.shadowBlur=0;
  ctx.fillStyle='#e0e0ff';ctx.font='20px monospace';ctx.fillText('SCORE: '+score.toLocaleString(),W/2,H/2-10);
  ctx.fillStyle='#8888aa';ctx.font='14px monospace';ctx.fillText('Wave reached: '+wave+'   ·   Best combo: '+comboBest+'x',W/2,H/2+20);
  ctx.fillStyle='#555';ctx.font='13px monospace';ctx.fillText('Click to retry',W/2,H/2+60);
}

function drawWaveCard(){
  if(!waveCard.active)return;
  const t=waveCard.t;
  // Ease in, hold, ease out over ~90 frames
  let a=1;
  if(t<15)a=t/15;
  else if(t>65)a=Math.max(0,1-(t-65)/25);
  const slide=t<15?(1-t/15)*40:0;
  ctx.save();
  ctx.globalAlpha=a;
  ctx.textAlign='center';
  ctx.shadowColor='#00e5ff';ctx.shadowBlur=22;
  ctx.fillStyle='#00e5ff';
  ctx.font='bold 34px monospace';
  ctx.fillText(waveCard.text,W/2,H/2-slide);
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,229,255,0.5)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W/2-90,H/2+18-slide);ctx.lineTo(W/2+90,H/2+18-slide);ctx.stroke();
  ctx.restore();
}

function drawComboHUD(){
  if(combo<2)return;
  const pulse=0.85+0.15*Math.sin(frame*0.3);
  ctx.save();
  ctx.textAlign='right';
  ctx.font='bold 16px monospace';
  ctx.fillStyle=combo>=6?'#fff176':'#ff8a65';
  ctx.globalAlpha=Math.min(1,comboTimer/20)*pulse;
  if(comboTimer<90)ctx.globalAlpha=Math.min(1,0.6+0.4*pulse);
  ctx.fillText(combo+'x',W-14,28);
  // Decay bar under the combo counter shows how much time is left to extend the streak
  const w=46;
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(W-14-w,34,w,3);
  ctx.fillStyle=combo>=6?'#fff176':'#ff8a65';
  ctx.fillRect(W-14-w,34,w*(comboTimer/90),3);
  ctx.restore();
}

function draw(){
  ctx.save();
  ctx.translate(shakeX,shakeY);

  ctx.fillStyle='#050510';ctx.fillRect(-10,-10,W+20,H+20);

  nebulae.forEach(n=>{
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,`hsla(${n.hue},70%,35%,${n.alpha*1.6})`);
    g.addColorStop(0.5,`hsla(${n.hue},60%,20%,${n.alpha})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
  });

  stars.forEach(s=>{
    const twinkle=0.5+0.5*Math.sin(frame*0.05+s.b*10);
    ctx.fillStyle=`rgba(${180+s.b*75|0},${180+s.b*75|0},255,${twinkle*0.8})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });

  debris.forEach(d=>{
    ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.rot);
    ctx.globalAlpha=d.alpha;
    ctx.fillStyle='#1a1520';ctx.strokeStyle='#3a3050';ctx.lineWidth=1;
    ctx.beginPath();d.pts.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.globalAlpha=1;ctx.restore();
  });

  explosions.forEach(e=>{
    ctx.globalAlpha=e.life*0.5;
    ctx.strokeStyle=e.color;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  });
  // Bright inner shock rings — sharper, whiter, fast-fading flash layered on the soft shockwave
  rings.forEach(r=>{
    ctx.globalAlpha=r.life*0.7;
    ctx.strokeStyle=r.color;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  });

  pickups.forEach(p=>{
    const pulse=0.6+0.4*Math.sin(p.t*0.15);
    ctx.fillStyle=p.type==='shield'?'#4fc3f7':'#fff176';
    ctx.globalAlpha=pulse;
    ctx.font='16px monospace';ctx.textAlign='center';
    ctx.fillText(p.type==='shield'?'⬡':'★',p.x,p.y);
    ctx.globalAlpha=1;
  });

  bullets.filter(b=>!b.own).forEach(b=>{
    ctx.shadowColor=b.color;ctx.shadowBlur=10;
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  bullets.filter(b=>b.own).forEach(b=>{
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*2);
    g.addColorStop(0,'rgba(0,229,255,1)');g.addColorStop(1,'rgba(0,150,200,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*2,0,Math.PI*2);ctx.fill();
  });

  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });

  enemies.forEach(drawEnemy);

  if(state==='playing'){
    if(player.invincible===0||frame%6<3){
      const angle=Math.atan2(player.my-player.y,player.mx-player.x)+Math.PI/2;
      drawShip(player.x,player.y,angle,player.tilt);
      ctx.strokeStyle='rgba(0,229,255,0.4)';ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(player.mx-8,player.my);ctx.lineTo(player.mx+8,player.my);
      ctx.moveTo(player.mx,player.my-8);ctx.lineTo(player.mx,player.my+8);
      ctx.stroke();
      ctx.beginPath();ctx.arc(player.mx,player.my,5,0,Math.PI*2);ctx.stroke();
    }
  }

  // Floating score/combo text, drawn above everything else in-world
  floatTexts.forEach(f=>{
    ctx.save();
    ctx.globalAlpha=Math.min(1,f.life*1.5);
    ctx.fillStyle=f.color;
    ctx.font='bold 13px monospace';
    ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
    ctx.restore();
  });

  ctx.restore();

  // Damage flash vignette — drawn in screen space (untranslated) so the shake doesn't move it
  if(damageFlash>0){
    const a=damageFlash*0.35;
    const g=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.7);
    g.addColorStop(0,'rgba(255,0,0,0)');
    g.addColorStop(1,`rgba(255,0,0,${a})`);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }

  // Low-shield heartbeat border pulse — persistent ambient warning, separate from the one-off damage flash
  if(state==='playing'&&shield<25){
    const pulse=0.5+0.5*Math.sin(frame*0.25);
    const a=(1-shield/25)*0.3*pulse;
    ctx.strokeStyle=`rgba(255,40,40,${a})`;
    ctx.lineWidth=10;
    ctx.strokeRect(5,5,W-10,H-10);
  }

  drawComboHUD();
  drawWaveCard();

  if(state==='title')drawTitle();
  if(state==='gameover')drawGameOver();
}

function loop(){
  if(state==='playing')update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
